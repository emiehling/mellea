model: "ibm-granite/granite-4.0-micro"
description: "Steers responses toward more optimistic, positive phrasing."
handler: activation_steering
default_params:
  layer: 28
  transform: additive
  multiplier: 0.75
  token_positions: all
param_space:
  by_layer:
    28:
      multiplier: {min: -1.25, max: 1.25}
    27:
      multiplier: {min: -1.25, max: 1.0}
    23:
      multiplier: {min: -1.25, max: 1.0}